<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Photo Editor - Sathanic Edit</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Lobster&family=Bebas+Neue&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <button id="export-btn">EXPORT</button>
        <input type="file" id="upload-input" hidden accept="image/*">
        <button onclick="document.getElementById('upload-input').click()">UPLOAD</button>
    </div>

    <div class="canvas-wrapper">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div class="layer-tray" id="layerTray">
        <span>Layers: </span>
        </div>

    <div class="bottom-nav">
        <div class="tool-item" onclick="showTools('filter-panel')">
            <span>Filters</span>
        </div>
        <div class="tool-item" onclick="showTools('font-panel')">
            <span>Text/Fonts</span>
        </div>
        <div class="tool-item" onclick="showTools('overlay-panel')">
            <span>Overlay</span>
        </div>
        <div class="tool-item" onclick="showTools('adjust-panel')">
            <span>Adjust</span>
        </div>
    </div>

    <div id="overlay-panel" class="tool-panel">
    <h3>Overlay Tools</h3>
    <input type="file" id="overlay-upload" hidden accept="image/*" onchange="addOverlayImage(event)">
    <button class="pro-btn" onclick="document.getElementById('overlay-upload').click()">+ Add Overlay</button>
    <div id="layerTray" class="layer-tray"></div>
</div>

    <div id="filter-panel" class="tool-panel">
        <h3>100+ Effects</h3>
        <div class="filter-list" id="filterList"></div>
    </div>
</div>

<script src="fonts.js"></script>
<script src="filters.js"></script>
<script src="editor.js"></script>
</body>
</html>

<body>
    <div id="splash-screen">
        <div class="welcome-text">
            <h1 class="animate-pop-in">WELCOME TO</h1>
            <h1 class="animate-text-reveal">
                <span>SATHANIC</span>
            </h1>
            <p class="animate-fade-in">Newly Released Image & Photo Editor</p>
        </div>
    </div>

    <div class="app-container" id="main-app" style="display: none;">
        </div>

    <script src="splash.js"></script> 
    
    <script src="fonts.js"></script>
    <script src="filters.js"></script>
    <script src="layers.js"></script> <script src="editor.js"></script>
</body>
